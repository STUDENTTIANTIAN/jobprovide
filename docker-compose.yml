version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/subtitle
      - REDIS_URL=redis://redis:6379/0
      - TEI_URL=http://tei:80
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - db
      - redis
      - tei
      - qdrant
    volumes:
      - uploads:/app/uploads

  celery:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/subtitle
      - REDIS_URL=redis://redis:6379/0
      - TEI_URL=http://tei:80
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - db
      - redis
      - tei
      - qdrant

  # HuggingFace Text Embeddings Inference
  # 模型: BAAI/bge-large-zh-v1.5 (1024维中文向量)
  # 参考: E:\shangagent\data_agent 项目
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    ports:
      - "8081:80"
    volumes:
      - tei_data:/data
    command: --model-id BAAI/bge-large-zh-v1.8
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}

  # Qdrant Vector Database
  # 参考: E:\shangagent\data_agent 项目
  qdrant:
    image: qdrant/qdrant:v1.16
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=subtitle
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  pgdata:
  uploads:
  tei_data:
  qdrant_data:
